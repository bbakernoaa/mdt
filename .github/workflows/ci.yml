name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_call:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Lint
        run: uv run ruff check src/ tests/

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Micromamba
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-name: mdt
          create-args: >-
            python=3.12
            ecflow
            esmpy
          condarc: |
            channels:
              - conda-forge
      - name: Install dependencies
        shell: bash -el {0}
        run: |
          uv pip install -e ".[all]" mypy types-PyYAML types-networkx pandas-stubs
      - name: Type Check
        shell: bash -el {0}
        run: uv run mypy src/mdt

  test:
    runs-on: ubuntu-latest
    needs: [lint, type-check]
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Micromamba
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-name: mdt
          create-args: >-
            python=${{ matrix.python-version }}
            ecflow
            esmpy
          condarc: |
            channels:
              - conda-forge

      - name: Install dependencies
        shell: bash -el {0}
        run: |
          uv pip install -e ".[all]" pytest-cov

      - name: Test
        shell: bash -el {0}
        run: |
          uv run pytest tests/ -v --tb=short --cov=src/mdt --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  release-dry-run:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Python Semantic Release Dry Run
        uses: python-semantic-release/python-semantic-release@v9.21.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          root_options: "-vv --dry-run"
