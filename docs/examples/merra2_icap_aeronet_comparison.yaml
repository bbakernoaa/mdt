# Comparison of MERRA-2 and ICAP-MME against AERONET observations
# and Direct Model-to-Model Bias Analysis

data:
  merra2_model:
    type: "merra2"
    kwargs:
      dates: "2023-01-01"
      product: "inst1_2d_asm_Nx"

  icap_mme_model:
    type: "icap_mme"
    kwargs:
      date: "2023-01-01"
      product: "MMC"
      data_var: "modeaod550"

  aeronet_obs:
    type: "aeronet"
    kwargs:
      dates: "2023-01-01"

pairing:
  # Model vs Obs (Interpolation to AERONET sites)
  pair_merra2_obs:
    source: "merra2_model"
    target: "aeronet_obs"
    method: "nearest"

  pair_icap_obs:
    source: "icap_mme_model"
    target: "aeronet_obs"
    method: "nearest"

  # Model vs Model (Regrid MERRA-2 to ICAP-MME grid for bias plot)
  pair_merra2_icap:
    source: "merra2_model"
    target: "icap_mme_model"
    method: "bilinear"
    kwargs:
      merge: true
      suffix: "_icap"

combine:
  obs_comparison:
    sources:
      - pair_merra2_obs
      - pair_icap_obs
    dim: "model"

statistics:
  # Stats against AERONET
  obs_stats:
    input: "obs_comparison"
    metrics: ["rmse", "mb", "corr"]
    kwargs:
      obs_var: "aod_550nm"
      mod_var: "AOD"

  # Direct Model Bias (Gridded)
  model_bias_stats:
    input: "pair_merra2_icap"
    metrics: ["mb"]
    kwargs:
      obs_var: "modeaod550"  # ICAP acts as reference
      mod_var: "TOTEXTTAU"

plots:
  # Map of model performance at observation sites
  obs_spatial_map:
    input: "obs_comparison"
    type: "spatial"
    kwargs:
      savename: "obs_comparison_map.png"

  # Spatial bias map: MERRA-2 vs ICAP-MME
  model_bias_map:
    input: "model_bias_stats"
    type: "spatial"
    kwargs:
      savename: "merra2_vs_icap_bias.png"
      cmap: "RdBu_r"

execution:
  default_cluster: "local"
  clusters:
    local:
      mode: "local"
      workers: 4
