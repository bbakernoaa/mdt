data:
  gfs_model:
    type: "gfs"
    kwargs:
      dates: "2023-08-01"
      lead_time: [0, 3, 6, 9, 12, 15, 18, 21, 24]
      # grib2io/xarray backend filtering compatible with PR 246 workflows
      filters:
        typeOfFirstFixedSurface: 103 # 2 m above ground level
    zarr_store:
      enabled: true
      backend: "icechunk"
      # Required only when backend is "icechunk"; set to your own repo path.
      icechunk_url: "s3://<your-bucket>/<your-gfs-icechunk-repo>"
      max_scan_attempts: 5
      network_timeout: 60.0
      max_concurrent_requests: 16

  ish_lite_obs:
    type: "ish_lite"
    kwargs:
      dates: "2023-08-01"

pairing:
  pair_gfs_ish:
    source: "gfs_model"
    target: "ish_lite_obs"
    method: "bilinear"

statistics:
  met_stats:
    input: "pair_gfs_ish"
    metrics: ["rmse", "mb", "mae", "mse", "mape", "ioa_m", "fac2", "r2", "d1", "e1", "ac"]
    kwargs:
      obs_var: "t2m"
      mod_var: "TMP_2maboveground"
      savename: "gfs_ish_stats.md"

plots:
  timeseries_temp:
    input: "pair_gfs_ish"
    type: "timeseries"
    kwargs:
      savename: "gfs_ish_temp_ts.png"
      columns:
        t2m:
          label: "ISH-Lite"
          color: "black"
        TMP_2maboveground:
          label: "GFS"
          color: "green"

  taylor_temp:
    input: "pair_gfs_ish"
    type: "taylor"
    kwargs:
      savename: "gfs_ish_taylor.png"
      col1: "t2m"
      col2: "TMP_2maboveground"
      label1: "GFS vs ISH-Lite"

  scatter_temp:
    input: "pair_gfs_ish"
    type: "scatter"
    kwargs:
      savename: "gfs_ish_scatter.png"
      x: "t2m"
      y: "TMP_2maboveground"
      title: "GFS vs ISH-Lite Temperature"

  spatial_bias:
    input: "pair_gfs_ish"
    type: "spatial_bias_scatter"
    kwargs:
      savename: "gfs_ish_spatial_bias.png"
      col1: "t2m"
      col2: "TMP_2maboveground"
      fact: 0.05

  radar_plot:
    input: "pair_gfs_ish"
    type: "radar"
    kwargs:
      savename: "gfs_ish_radar.png"
      obs_col: "t2m"
      mod_cols: ["TMP_2maboveground"]
